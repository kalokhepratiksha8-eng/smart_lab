<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Smart Lab Management{% endblock %}</title>

  <!-- Fonts & Bootstrap -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  {% block extra_head %}{% endblock %}

  <style>
    body {
      font-family: 'Sora', sans-serif;
      min-height: 100vh;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }
    .sidebar-card {
      background: rgba(255, 255, 255, 0.9);
    }
    .menu-link {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .5rem .75rem;
      border-radius: 8px;
      font-weight: 600;
      color: #0a2b48;
      text-decoration: none;
    }
    .menu-link:hover, .menu-link.active {
      background-color: #0d6efd;
      color: #fff;
    }
    .btn-app {
      background-color: #0d6efd;
      color: #fff;
      font-weight: 600;
      border-radius: 8px;
      padding: 10px;
    }
    .btn-app:hover {
      background-color: #0b5ed7;
    }
  </style>
</head>
<body class="app-body" data-page="{% block page %}app{% endblock %}">
  <main class="container-fluid p-3 p-md-4 p-lg-5">
    <div class="row g-3 g-lg-4">
      <!-- Sidebar -->
      <aside class="col-12 col-lg-3 col-xl-2">
        <section class="glass-card sidebar-card p-3 h-100">
          <h4 class="mb-1">DES PU Smart Lab</h4>
          <p class="small text-muted mb-3">Management System</p>
          <nav class="d-grid gap-2">
            <a class="menu-link" data-nav="dashboard" href="{{ url_for('home') }}"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a class="menu-link" data-nav="labs" href="{{ url_for('labs') }}"><i class="bi bi-building"></i> Labs</a>
            <a class="menu-link" data-nav="pcs" href="{{ url_for('pcs') }}"><i class="bi bi-pc-display"></i> PCs</a>
            <a class="menu-link" data-nav="software" href="{{ url_for('software') }}"><i class="bi bi-box-seam"></i> Software</a>
            <a class="menu-link" data-nav="maintenance" href="{{ url_for('maintenance') }}"><i class="bi bi-tools"></i> Maintenance</a>
            <a class="menu-link" data-nav="users" href="{{ url_for('users') }}"><i class="bi bi-people"></i> Users</a>
            <a class="menu-link" href="{{ url_for('logout') }}"><i class="bi bi-box-arrow-right"></i> Logout</a>
          </nav>
        </section>
      </aside>

      <!-- Main Content -->
      <section class="col-12 col-lg-9 col-xl-10">
        <article class="glass-card p-3 p-md-4 p-lg-5">
          {% block content %}{% endblock %}
        </article>
      </section>
    </div>
  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
