<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab Not Found | DES PU Smart Lab</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #0a2b48; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { border-radius: 14px; max-width: 380px; width: 100%; padding: 2rem; text-align: center; }
    .icon { font-size: 3rem; color: #dc2626; }
    h5 { color: #0a2b48; font-weight: 700; }
    p { color: #6c757d; font-size: .88rem; }
  </style>
</head>
<body>
  <div class="card shadow">
    <i class="bi bi-qr-code-scan icon mb-3"></i>
    <h5>Invalid QR Code</h5>
    <p>{{ message or "This QR code is not valid. Please scan the correct lab QR code." }}</p>
    <p class="mt-3 text-muted" style="font-size:.75rem;">DES PU Smart Lab Management System</p>
  </div>
</body>
</html>
