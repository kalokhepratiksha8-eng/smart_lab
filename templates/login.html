<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | DES PU Smart Lab</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <style>
    body.login-body {
      font-family: 'Sora', sans-serif;
      background: url('http://news-images.dhan.co/g-tech-info-training-limited-conducts-independent-directors-meeting-on-march-20-2026.jpg') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      max-width: 400px;
      width: 100%;
      padding: 2rem;
    }
    .btn-app {
      background-color: #0d6efd;
      color: #fff;
      font-weight: 600;
      border-radius: 8px;
      padding: 10px;
    }
    .btn-app:hover {
      background-color: #0b5ed7;
    }
    .app-input {
      border-radius: 8px;
      padding: 10px;
    }
  </style>
</head>
<body class="login-body">
  <main class="min-vh-100 d-flex align-items-center justify-content-center p-4">
    <section class="login-card">
      <h2 class="text-center mb-4">DES PU Smart Lab Login</h2>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'error' else 'info' }} py-2 small mb-3">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-3">
          <label class="form-label" for="username">Username</label>
          <input class="form-control app-input" id="username" name="username" type="text" placeholder="Enter your username" required>
        </div>
        <div class="mb-4">
          <label class="form-label" for="password">Password</label>
          <input class="form-control app-input" id="password" name="password" type="password" placeholder="********" required>
        </div>
        <button class="btn btn-app w-100 mb-3" type="submit">Login</button>
      </form>
    </section>
  </main>
</body>
</html>
